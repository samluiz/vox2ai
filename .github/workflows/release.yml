name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  linux:
    name: Linux desktop artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm \
            build-essential \
            portaudio19-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate versions
        run: python scripts/check_versions.py

      - name: Build Python sidecar
        run: python scripts/build_sidecar.py

      - name: Copy sidecar for Tauri
        run: python scripts/copy_sidecar.py

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and upload Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: vox2ai ${{ env.RELEASE_TAG }}
          releaseBody: |
            Linux desktop installers for vox2ai.

            Artifacts:
            - AppImage
            - Debian package (.deb)
            - RPM package (.rpm)
          releaseDraft: false
          prerelease: false

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vox2ai-linux-${{ env.RELEASE_TAG }}
          path: |
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
